# =============================================================================
# Docker Compose — Local Development
# Mirrors production topology: App (PHP-FPM + Nginx) + MySQL
# Usage: docker compose up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Application Container (PHP-FPM + Nginx + Queue Worker)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: planner-studio-app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      APP_NAME: PlannerStudio
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8080
      APP_KEY: "${APP_KEY}"
      LOG_CHANNEL: stderr
      LOG_LEVEL: warning
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: planner_studio
      DB_USERNAME: planner
      DB_PASSWORD: "${DB_PASSWORD:-secret}"
      SESSION_DRIVER: database
      SESSION_SECURE_COOKIE: "false"
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: local
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    networks:
      - planner-network

  # ---------------------------------------------------------------------------
  # MySQL Database
  # Matches Azure Database for MySQL Flexible Server configuration
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: planner-studio-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-rootsecret}"
      MYSQL_DATABASE: planner_studio
      MYSQL_USER: planner
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - planner-network

volumes:
  mysql-data:
    driver: local

networks:
  planner-network:
    driver: bridge
