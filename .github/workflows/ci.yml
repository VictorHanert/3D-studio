# =============================================================================
# CI Pipeline — Planner Studio
# Runs on every push/PR to main: lints, type-checks, and tests
# CD (deploy.yml) only triggers after this succeeds
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Backend: PHP Lint + Tests
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.4']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_mysql, pdo_sqlite, opcache, pcntl, mbstring
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Code style (Pint)
        run: vendor/bin/pint --test

      - name: Run tests (Pest)
        run: php artisan test --compact --no-interaction
        env:
          APP_ENV: testing
          APP_KEY: base64:Nq6xLKtNLcK5iCDSKO4aPV6KRv+9G9cxp6y0eKkqfSU=
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync

  # ---------------------------------------------------------------------------
  # Frontend: Lint + Type-check + Tests
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['22']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npx eslint . --max-warnings=0

      - name: Format check (Prettier)
        run: npx prettier --check resources/

      - name: Type check (TypeScript)
        run: npx tsc --noEmit

      - name: Run tests (Vitest)
        run: npx vitest run

  # ---------------------------------------------------------------------------
  # Docker Build Validation
  # Ensures the Dockerfile builds successfully (no push)
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validation only)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: planner-studio:ci-${{ github.sha }}
