# =============================================================================
# CD Pipeline — Planner Studio
# Builds production Docker image, pushes to ACR, deploys to Azure App Service
# Only runs after CI succeeds on the main branch
# =============================================================================

name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: cd-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to Azure
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'

    environment:
      name: production
      url: https://planner-studio.azurewebsites.net

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/planner-studio:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/planner-studio:${{ github.sha }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: planner-studio
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/planner-studio:${{ github.sha }}

      - name: Wait for deployment health check
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 30

          MAX_RETRIES=10
          RETRY_INTERVAL=15
          URL="https://planner-studio.azurewebsites.net/up"

          for i in $(seq 1 $MAX_RETRIES); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            echo "Attempt $i/$MAX_RETRIES: HTTP $STATUS"

            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi

            if [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "Retrying in ${RETRY_INTERVAL}s..."
              sleep $RETRY_INTERVAL
            fi
          done

          echo "Health check failed after $MAX_RETRIES attempts"
          exit 1
