name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  php:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite, sqlite3
          coverage: xdebug

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate --no-interaction
          touch database/database.sqlite
          mkdir -p build/coverage/phpunit

      - name: Run migrations
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate --force --no-interaction

      - name: Run PHP tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
          XDEBUG_MODE: coverage
        run: php artisan test --compact --coverage --coverage-clover=build/coverage/phpunit/clover.xml

      - name: Upload PHP coverage
        uses: actions/upload-artifact@v4
        with:
          name: php-coverage
          path: build/coverage/phpunit

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        # Her tilføjer vi miljøvariablen for at omgå Laravels tjek
        env:
          LARAVEL_BYPASS_ENV_CHECK: 1
        run: npm run test:coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage
