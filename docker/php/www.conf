; =============================================================================
; PHP-FPM Pool Configuration for Planner Studio
; Tuned for Azure App Service B1 (1 vCPU, 1.75 GB RAM)
; =============================================================================

[www]
; Process user/group
user = www-data
group = www-data

; Listen on TCP port (not unix socket — Nginx and PHP-FPM in same container)
listen = 127.0.0.1:9000
listen.owner = www-data
listen.group = www-data

; --- Process Manager ---
; "dynamic" adjusts workers based on demand
pm = dynamic
pm.max_children = 15
pm.start_servers = 3
pm.min_spare_servers = 2
pm.max_spare_servers = 5
pm.max_requests = 500
pm.process_idle_timeout = 10s

; --- Logging ---
; Capture worker output for Laravel logs going to stderr
catch_workers_output = yes
decorate_workers_output = no

; Access log disabled (Nginx handles access logging)
access.log = /dev/null

; Error log to stderr for Azure Log Analytics
php_admin_value[error_log] = /dev/stderr
php_admin_flag[log_errors] = on

; --- Security ---
; Clear environment variables from parent process
clear_env = no

; --- Timeouts ---
request_terminate_timeout = 60s
