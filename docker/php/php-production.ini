; =============================================================================
; PHP Production Configuration for Planner Studio 3D Configurator
; Optimized for Laravel 12 on Alpine Linux with OPcache
; =============================================================================

[PHP]
; --- Error Handling ---
display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
log_errors = On
error_log = /dev/stderr

; --- Resource Limits ---
memory_limit = 256M
max_execution_time = 60
max_input_time = 60
max_input_vars = 5000
post_max_size = 12M
upload_max_filesize = 10M

; --- Security ---
expose_php = Off
allow_url_fopen = On
allow_url_include = Off
session.cookie_httponly = On
session.cookie_secure = On
session.use_strict_mode = On
session.cookie_samesite = Lax

; --- Performance ---
realpath_cache_size = 4096k
realpath_cache_ttl = 600
output_buffering = 4096

; --- Timezone ---
date.timezone = Europe/Copenhagen

; =============================================================================
; OPcache Configuration
; Dramatically improves PHP performance by caching compiled bytecode
; =============================================================================
[opcache]
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.save_comments = 1
opcache.fast_shutdown = 1

; JIT compilation (PHP 8.4)
opcache.jit = 1255
opcache.jit_buffer_size = 64M
